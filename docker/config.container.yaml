server:
  host: '0.0.0.0'
  port: 9000

browser:
  # 容器内 fingerprint-chromium 的固定路径
  chromium_bin: '/opt/fingerprint-chromium/chrome'

  # Claude 不建议 headless，默认继续使用 Xvfb 虚拟显示
  headless: false

  # 容器内默认关闭 sandbox，避免 Chromium 因容器权限限制无法启动
  no_sandbox: true

  # 容器环境通常没有可用 GPU，建议显式关闭
  disable_gpu: true

  # 某些容器环境里 GPU sandbox 也可能导致额外问题
  disable_gpu_sandbox: true

  cdp_port_start: 9223
  cdp_port_count: 20

scheduler:
  tab_max_concurrent: 5
  browser_gc_interval_seconds: 300
  tab_idle_seconds: 900
  resident_browser_count: 0

claude:
  start_url: ''
  api_base: ''
  model_mapping:
    s4: claude-sonnet-4-5-20250929

mock:
  port: 8002
